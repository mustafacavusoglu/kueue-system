{% extends "base.html" %}
{% block title %}Baklava AI - Panel{% endblock %}
{% block content %}
<nav class="navbar">
    <div style="max-width: 1000px; margin: 0 auto; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 14px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <div style="width: 28px; height: 28px; background: linear-gradient(135deg, var(--gold-400), var(--gold-700)); border-radius: 7px; transform: rotate(45deg); display: flex; align-items: center; justify-content: center;">
                    <span style="transform: rotate(-45deg); font-weight: 900; font-size: 12px; color: #78350f;">B</span>
                </div>
                <span class="glow-text" style="font-size: 16px; font-weight: 700;">Baklava AI</span>
            </div>
            <span id="position-badge" style="display: none; padding: 4px 12px; background: var(--gold-badge-bg); border: 1px solid var(--gold-glow-border); border-radius: 20px; font-size: 12px; font-weight: 700; color: var(--gold-badge-text);">
                Sıranız: <span id="position-number"></span>.
            </span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            {% if is_admin %}
            <a href="/admin" style="padding: 5px 12px; background: var(--red-bg); border: 1px solid var(--red-border); border-radius: 8px; color: var(--red-text); font-size: 12px; font-weight: 600; text-decoration: none;">Admin Paneli</a>
            {% endif %}
            <button id="theme-toggle-btn" class="theme-toggle" onclick="toggleTheme()"></button>
            <span style="color: var(--text-secondary); font-size: 13px;"><span style="color: var(--text-primary); font-weight: 600;">{{ username }}</span></span>
            <a href="/logout" class="logout-btn">Çıkış</a>
        </div>
    </div>
</nav>

<div style="max-width: 1000px; margin: 0 auto; padding: 28px 24px;">

    <div id="queue-visual" class="glass" style="padding: 20px 28px; margin-bottom: 24px; display: none;">
        <div style="display: flex; align-items: center; gap: 14px;">
            <div id="queue-visual-position" style="width: 44px; height: 44px; background: linear-gradient(135deg, var(--gold-400), var(--gold-600)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; color: #78350f; flex-shrink: 0;"></div>
            <div>
                <div id="queue-visual-text" style="color: var(--text-primary); font-weight: 600; font-size: 15px;"></div>
                <div style="color: var(--text-muted); font-size: 12px; margin-top: 2px;">Ekip lideri yakında sizinle ilgilenecek</div>
            </div>
        </div>
    </div>

    <div class="glass" style="padding: 24px; margin-bottom: 24px;">
        <h2 style="color: var(--text-primary); font-size: 15px; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 8px;">
            <svg width="16" height="16" fill="none" stroke="var(--gold-500)" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Kuyruğa Ekle
        </h2>
        <form id="add-form" style="display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 180px;">
                <label>Konu</label>
                <input type="text" name="subject" id="input-subject" required class="input-field" placeholder="Sorunuzu özetleyin...">
            </div>
            <div style="flex: 2; min-width: 220px;">
                <label>Açıklama</label>
                <input type="text" name="description" id="input-description" class="input-field" placeholder="Detaylar (opsiyonel)">
            </div>
            <button type="submit" id="add-btn" class="btn-primary" style="height: 42px; white-space: nowrap;">Kuyruğa Ekle</button>
        </form>
    </div>

    <div>
        <h2 style="color: var(--text-primary); font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px;">
            <svg width="16" height="16" fill="none" stroke="var(--gold-500)" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            Kuyruğum
        </h2>
        <div id="items-list"></div>
    </div>

    <div style="margin-top: 28px;">
        <h2 style="color: var(--text-primary); font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px;">
            <svg width="16" height="16" fill="none" stroke="var(--gold-500)" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
            Genel Kuyruk
            <span id="all-queue-count" style="font-size: 12px; font-weight: 600; color: var(--text-muted);">(0 kişi)</span>
        </h2>
        <div id="all-queue-list"></div>
    </div>
</div>

<script>
(function() {
    updateThemeIcon();

    function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function renderComments(item) {
        if (!item.comments || item.comments.length === 0) return '';
        var html = '<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border-color);">';
        item.comments.forEach(function(c) {
            html += '<div style="display:flex;gap:8px;margin-bottom:6px;">' +
                '<div style="flex-shrink:0;width:6px;height:6px;border-radius:50%;background:var(--gold-400);margin-top:6px;"></div>' +
                '<div style="flex:1;min-width:0;">' +
                    '<div style="display:flex;align-items:center;gap:6px;">' +
                        '<span style="color:var(--gold-badge-text);font-size:11px;font-weight:600;">' + escapeHtml(c.display_name) + '</span>' +
                        '<span style="color:var(--text-muted);font-size:10px;">' + c.created_at + '</span>' +
                    '</div>' +
                    '<div style="color:var(--text-secondary);font-size:12px;margin-top:1px;word-break:break-word;">' + escapeHtml(c.text) + '</div>' +
                '</div>' +
            '</div>';
        });
        html += '</div>';
        return html;
    }

    function renderCommentForm(item) {
        return '<div style="margin-top:8px;display:flex;gap:8px;">' +
            '<input type="text" id="comment-input-' + item.id + '" class="input-field" style="flex:1;height:34px;font-size:12px;" placeholder="Yorum yaz...">' +
            '<button class="btn-primary" style="height:34px;padding:0 12px;font-size:12px;" onclick="addUserComment(' + item.id + ')">Gönder</button>' +
        '</div>';
    }

    function renderItem(item) {
        var posHtml = '';
        if (item.status === 'waiting' && item.position) {
            posHtml = '<div class="position-badge">' + item.position + '</div>';
        } else if (item.status === 'completed') {
            posHtml = '<div style="width:36px;height:36px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:10px;display:flex;align-items:center;justify-content:center;"><svg width="16" height="16" fill="none" stroke="var(--green-text)" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div>';
        } else {
            posHtml = '<div style="width:36px;height:36px;background:var(--bg-card);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);">-</div>';
        }

        var badgeHtml = '';
        if (item.status === 'waiting') {
            badgeHtml = '<span class="badge-waiting"><span class="pulse-dot" style="width:6px;height:6px;"></span>Bekliyor</span>';
        } else {
            badgeHtml = '<span class="badge-completed">Tamamlandı</span>';
        }

        var deleteHtml = '';
        if (item.status === 'waiting') {
            deleteHtml = '<button class="btn-danger" onclick="deleteItem(' + item.id + ', this)" title="Kuyruktan çıkar"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>';
        }

        return '<div class="glass-card item-enter" data-id="' + item.id + '" style="padding:16px 20px;margin-bottom:8px;">' +
            '<div style="display:flex;align-items:center;justify-content:space-between;gap:14px;">' +
                '<div style="display:flex;align-items:center;gap:14px;flex:1;min-width:0;">' +
                    posHtml +
                    '<div style="flex:1;min-width:0;">' +
                        '<div style="color:var(--text-primary);font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(item.subject) + '</div>' +
                        (item.description ? '<div style="color:var(--text-muted);font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(item.description) + '</div>' : '') +
                '</div>' +
            '</div>' +
            renderComments(item) +
            (item.status === 'waiting' ? renderCommentForm(item) : '') +
        '</div>';
    }

    function renderEmpty() {
        return '<div class="glass" style="padding:40px 20px;">' +
            '<div class="empty-state">' +
                '<svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12l-3-3m0 0l-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>' +
                '<p style="font-size:14px;">Henüz kuyrukta kaydınız yok.</p>' +
                '<p style="font-size:12px;margin-top:4px;">Yukarıdaki formu kullanarak kuyruğa ekleyebilirsiniz.</p>' +
            '</div></div>';
    }

    function updateUI(data) {
        var list = document.getElementById('items-list');
        if (!data.items || data.items.length === 0) {
            list.innerHTML = renderEmpty();
        } else {
            list.innerHTML = data.items.map(renderItem).join('');
        }

        var badge = document.getElementById('position-badge');
        var visual = document.getElementById('queue-visual');
        if (data.global_position) {
            badge.style.display = '';
            document.getElementById('position-number').textContent = data.global_position;
            visual.style.display = '';
            document.getElementById('queue-visual-position').textContent = data.global_position;
            document.getElementById('queue-visual-text').textContent = 'Kuyrukta ' + data.global_position + '. sıradasınız';
        } else {
            badge.style.display = 'none';
            visual.style.display = 'none';
        }
    }

    function loadItems() {
        fetch('/queue/my').then(function(r) { return r.json(); }).then(updateUI);
    }

    document.getElementById('add-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var btn = document.getElementById('add-btn');
        var subject = document.getElementById('input-subject');
        var desc = document.getElementById('input-description');
        btn.disabled = true;

        fetch('/queue/add', {
            method: 'POST',
            headers: { 'Accept': 'application/json', 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'subject=' + encodeURIComponent(subject.value) + '&description=' + encodeURIComponent(desc.value)
        }).then(function(r) { return r.json(); }).then(function() {
            subject.value = '';
            desc.value = '';
            subject.focus();
            loadItems();
            loadAllQueue();
            showToast('Kuyruğa eklendi!', 'success');
        }).catch(function() {
            showToast('Hata oluştu', 'error');
        }).finally(function() {
            btn.disabled = false;
        });
    });

    window.deleteItem = function(id, btn) {
        var row = btn.closest('.glass-card');
        row.classList.remove('item-enter');
        row.classList.add('item-exit');

        fetch('/queue/' + id + '/delete', {
            method: 'POST',
            headers: { 'Accept': 'application/json' },
        }).then(function(r) { return r.json(); }).then(function() {
            loadItems();
            loadAllQueue();
            showToast('Kuyruktan çıkarıldı', 'success');
        }).catch(function() {
            row.classList.remove('item-exit');
            showToast('Hata oluştu', 'error');
        });
    };

    function renderAllQueueItem(item) {
        return '<div class="glass-card" style="padding:14px 20px;margin-bottom:6px;">' +
            '<div style="display:flex;align-items:center;gap:14px;">' +
                '<div class="position-badge">' + item.position + '</div>' +
                '<div style="flex:1;min-width:0;">' +
                    '<div style="color:var(--text-primary);font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(item.subject) + '</div>' +
                    '<div style="display:flex;align-items:center;gap:10px;margin-top:3px;">' +
                        '<span style="color:var(--gold-badge-text);font-size:11px;font-weight:600;">' + escapeHtml(item.display_name) + '</span>' +
                        '<span style="color:var(--text-muted);font-size:11px;">' + item.created_at + '</span>' +
                    '</div>' +
                '</div>' +
            '</div>' +
            renderComments(item) +
        '</div>';
    }

    function renderAllQueueEmpty() {
        return '<div class="glass" style="padding:36px 20px;"><div class="empty-state">' +
            '<svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' +
            '<p style="font-size:14px;">Kuyrukta bekleyen kimse yok.</p></div></div>';
    }

    function updateAllQueue(data) {
        document.getElementById('all-queue-count').textContent = '(' + data.items.length + ' kişi)';
        var list = document.getElementById('all-queue-list');
        list.innerHTML = data.items.length > 0
            ? data.items.map(renderAllQueueItem).join('')
            : renderAllQueueEmpty();
    }

    function loadAllQueue() {
        fetch('/queue/all').then(function(r) { return r.json(); }).then(updateAllQueue);
    }

    window.addUserComment = function(itemId) {
        var input = document.getElementById('comment-input-' + itemId);
        var text = input.value.trim();
        if (!text) return;
        input.disabled = true;

        fetch('/queue/' + itemId + '/comment', {
            method: 'POST',
            headers: { 'Accept': 'application/json', 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'text=' + encodeURIComponent(text),
        }).then(function(r) { return r.json(); }).then(function() {
            loadItems();
            loadAllQueue();
            showToast('Yorum eklendi!', 'success');
        }).catch(function() {
            showToast('Hata oluştu', 'error');
        }).finally(function() {
            input.disabled = false;
        });
    };

    loadItems();
    loadAllQueue();
})();
</script>
{% endblock %}
