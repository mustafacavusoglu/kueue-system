{% extends "base.html" %}
{% block title %}Baklava AI - Admin{% endblock %}
{% block content %}
<nav class="navbar">
    <div style="max-width: 1100px; margin: 0 auto; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 14px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <div style="width: 28px; height: 28px; background: linear-gradient(135deg, var(--gold-400), var(--gold-700)); border-radius: 7px; transform: rotate(45deg); display: flex; align-items: center; justify-content: center;">
                    <span style="transform: rotate(-45deg); font-weight: 900; font-size: 12px; color: #78350f;">B</span>
                </div>
                <span class="glow-text" style="font-size: 16px; font-weight: 700;">Baklava AI</span>
            </div>
            <span style="display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; background: var(--red-bg); border: 1px solid var(--red-border); border-radius: 20px; color: var(--red-text); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">
                <svg width="10" height="10" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                Admin
            </span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <a href="/dashboard" style="color: var(--text-secondary); font-size: 12px; text-decoration: none;">Panelime Dön</a>
            <button id="theme-toggle-btn" class="theme-toggle" onclick="toggleTheme()"></button>
            <span style="color: var(--text-secondary); font-size: 13px;"><span style="color: var(--text-primary); font-weight: 600;">{{ username }}</span></span>
            <a href="/logout" class="logout-btn">Çıkış</a>
        </div>
    </div>
</nav>

<div style="max-width: 1100px; margin: 0 auto; padding: 28px 24px;">

    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px;">
        <div class="glass" style="padding: 20px; text-align: center;">
            <div id="stat-waiting" style="font-size: 32px; font-weight: 900; background: linear-gradient(135deg, var(--gold-400), var(--gold-600)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">0</div>
            <div style="color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px;">Bekleyen</div>
        </div>
        <div class="glass" style="padding: 20px; text-align: center;">
            <div id="stat-completed" style="font-size: 32px; font-weight: 900; background: linear-gradient(135deg, #86efac, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">0</div>
            <div style="color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px;">Tamamlanan</div>
        </div>
        <div class="glass" style="padding: 20px; text-align: center;">
            <div id="stat-total" style="font-size: 32px; font-weight: 900; background: linear-gradient(135deg, #93c5fd, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">0</div>
            <div style="color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px;">Toplam</div>
        </div>
    </div>

    <div style="display: flex; gap: 6px; margin-bottom: 20px;">
        <button onclick="switchTab('waiting')" class="tab-btn active" data-tab="waiting">
            Bekleyenler (<span id="tab-waiting-count">0</span>)
        </button>
        <button onclick="switchTab('completed')" class="tab-btn" data-tab="completed">
            Tamamlananlar (<span id="tab-completed-count">0</span>)
        </button>
    </div>

    <div id="waiting-tab">
        <div id="waiting-list"></div>
    </div>

    <div id="completed-tab" style="display: none;">
        <div id="completed-list"></div>
    </div>
</div>

<script>
(function() {
    updateThemeIcon();

    function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function renderWaitingItem(item) {
        var descHtml = item.description
            ? '<div style="flex:1;min-width:0;color:var(--text-muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right;">' + escapeHtml(item.description) + '</div>'
            : '';
        return '<div class="glass-card item-enter" data-id="' + item.id + '" style="padding:16px 20px;margin-bottom:8px;">' +
            '<div style="display:flex;align-items:center;justify-content:space-between;gap:14px;">' +
                '<div style="display:flex;align-items:center;gap:14px;flex:1;min-width:0;">' +
                    '<div class="position-badge">' + item.position + '</div>' +
                    '<div style="flex:1;min-width:0;">' +
                        '<div style="color:var(--text-primary);font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(item.subject) + '</div>' +
                        '<div style="display:flex;align-items:center;gap:10px;margin-top:3px;">' +
                            '<span style="color:var(--gold-badge-text);font-size:11px;font-weight:600;">@' + escapeHtml(item.username) + '</span>' +
                            '<span style="color:var(--text-muted);font-size:11px;">' + item.created_at + '</span>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
                descHtml +
                '<button class="btn-success" onclick="completeItem(' + item.id + ', this)" style="flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 16px;">' +
                    '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' +
                    'Tamamla' +
                '</button>' +
            '</div>' +
        '</div>';
    }

    function renderCompletedItem(item) {
        return '<div class="glass-card" data-id="' + item.id + '" style="padding:16px 20px;margin-bottom:8px;opacity:0.65;">' +
            '<div style="display:flex;align-items:center;justify-content:space-between;gap:14px;">' +
                '<div style="display:flex;align-items:center;gap:14px;flex:1;min-width:0;">' +
                    '<div style="width:36px;height:36px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:10px;display:flex;align-items:center;justify-content:center;">' +
                        '<svg width="16" height="16" fill="none" stroke="var(--green-text)" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>' +
                    '</div>' +
                    '<div style="flex:1;min-width:0;">' +
                        '<div style="color:var(--text-primary);font-weight:600;font-size:14px;opacity:0.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(item.subject) + '</div>' +
                        '<div style="display:flex;align-items:center;gap:10px;margin-top:3px;">' +
                            '<span style="color:var(--text-muted);font-size:11px;font-weight:600;">@' + escapeHtml(item.username) + '</span>' +
                            '<span style="color:var(--text-muted);font-size:11px;">' + item.created_at + '</span>' +
                            (item.completed_at ? '<span style="color:var(--green-text);font-size:11px;opacity:0.7;">Tamamlanma: ' + item.completed_at + '</span>' : '') +
                        '</div>' +
                    '</div>' +
                '</div>' +
                '<span class="badge-completed">Tamamlandı</span>' +
            '</div>' +
        '</div>';
    }

    function renderEmpty(msg) {
        return '<div class="glass" style="padding:36px 20px;"><div class="empty-state">' +
            '<svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' +
            '<p style="font-size:14px;">' + msg + '</p></div></div>';
    }

    function updateUI(data) {
        document.getElementById('stat-waiting').textContent = data.waiting.length;
        document.getElementById('stat-completed').textContent = data.completed.length;
        document.getElementById('stat-total').textContent = data.waiting.length + data.completed.length;
        document.getElementById('tab-waiting-count').textContent = data.waiting.length;
        document.getElementById('tab-completed-count').textContent = data.completed.length;

        var wList = document.getElementById('waiting-list');
        wList.innerHTML = data.waiting.length > 0
            ? data.waiting.map(renderWaitingItem).join('')
            : renderEmpty('Kuyrukta bekleyen kimse yok.');

        var cList = document.getElementById('completed-list');
        cList.innerHTML = data.completed.length > 0
            ? data.completed.map(renderCompletedItem).join('')
            : renderEmpty('Henüz tamamlanan kayıt yok.');
    }

    function loadData() {
        fetch('/admin/data').then(function(r) { return r.json(); }).then(updateUI);
    }

    window.completeItem = function(id, btn) {
        var row = btn.closest('.glass-card');
        row.style.transition = 'all 0.3s ease';
        row.style.opacity = '0.3';
        row.style.transform = 'translateX(20px)';

        fetch('/admin/' + id + '/complete', {
            method: 'POST',
            headers: { 'Accept': 'application/json' },
        }).then(function(r) { return r.json(); }).then(function() {
            loadData();
            showToast('Kayıt tamamlandı!', 'success');
        }).catch(function() {
            row.style.opacity = '1';
            row.style.transform = 'none';
            showToast('Hata oluştu', 'error');
        });
    };

    window.switchTab = function(tab) {
        document.getElementById('waiting-tab').style.display = tab === 'waiting' ? '' : 'none';
        document.getElementById('completed-tab').style.display = tab === 'completed' ? '' : 'none';
        document.querySelectorAll('.tab-btn').forEach(function(btn) {
            btn.classList.toggle('active', btn.dataset.tab === tab);
        });
    };

    loadData();
})();
</script>
{% endblock %}
