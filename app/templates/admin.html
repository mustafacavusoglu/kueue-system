{% extends "base.html" %}
{% block title %}Baklava AI - Admin{% endblock %}
{% block content %}
<div hx-ext="sse" sse-connect="/events">

<nav class="navbar">
    <div style="max-width: 1100px; margin: 0 auto; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 14px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <div style="width: 28px; height: 28px; background: linear-gradient(135deg, var(--gold-400), var(--gold-700)); border-radius: 7px; transform: rotate(45deg); display: flex; align-items: center; justify-content: center;">
                    <span style="transform: rotate(-45deg); font-weight: 900; font-size: 12px; color: #78350f;">B</span>
                </div>
                <span class="glow-text" style="font-size: 16px; font-weight: 700;">Baklava AI</span>
            </div>
            <span style="display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; background: var(--red-bg); border: 1px solid var(--red-border); border-radius: 20px; color: var(--red-text); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">
                <svg width="10" height="10" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                Admin
            </span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <a href="/dashboard" style="color: var(--text-secondary); font-size: 12px; text-decoration: none;">Panelime Dön</a>
            <button id="theme-toggle-btn" class="theme-toggle" onclick="toggleTheme()"></button>
            <span style="color: var(--text-secondary); font-size: 13px;"><span style="color: var(--text-primary); font-weight: 600;">{{ username }}</span></span>
            <a href="/logout" class="logout-btn">Çıkış</a>
        </div>
    </div>
</nav>

<div style="max-width: 1100px; margin: 0 auto; padding: 28px 24px;">

    <div id="admin-stats"
         hx-get="/partial/admin/stats"
         hx-trigger="load, sse:queue_updated, sse:queue_reordered"
         hx-target="this"
         hx-swap="innerHTML">
    </div>

    <div style="display: flex; gap: 6px; margin-bottom: 20px;">
        <button onclick="switchTab('waiting')" class="tab-btn active" data-tab="waiting">
            Bekleyenler (<span id="tab-waiting-count" hx-get="/partial/admin/stats" hx-trigger="load, sse:queue_updated" hx-swap="none" _="on htmx:afterRequest get the innerText of #stat-waiting-value then set #tab-waiting-count's innerText to it">0</span>)
        </button>
        <button onclick="switchTab('completed')" class="tab-btn" data-tab="completed">
            Tamamlananlar (<span id="tab-completed-count">0</span>)
        </button>
        <button onclick="switchTab('deleted')" class="tab-btn" data-tab="deleted">
            Silinenler (<span id="tab-deleted-count">0</span>)
        </button>
    </div>

    <div id="waiting-tab">
        <div id="waiting-list"
             hx-get="/partial/admin/waiting"
             hx-trigger="load, sse:queue_updated, sse:queue_reordered"
             hx-target="this"
             hx-swap="innerHTML">
        </div>
    </div>

    <div id="completed-tab" style="display: none;">
        <div id="completed-list"
             hx-get="/partial/admin/completed"
             hx-trigger="load, sse:queue_updated"
             hx-target="this"
             hx-swap="innerHTML">
        </div>
    </div>

    <div id="deleted-tab" style="display: none;">
        <div id="deleted-list"
             hx-get="/partial/admin/deleted"
             hx-trigger="load, sse:queue_updated"
             hx-target="this"
             hx-swap="innerHTML">
        </div>
    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<script>
(function() {
    updateThemeIcon();

    function initSortable() {
        var el = document.getElementById('waiting-list');
        if (!el || el.dataset.sortableInit) return;
        el.dataset.sortableInit = 'true';

        new Sortable(el, {
            animation: 150,
            handle: '.position-badge',
            ghostClass: 'sortable-ghost',
            dragClass: 'sortable-drag',
            onEnd: function(evt) {
                var items = evt.from.querySelectorAll('[data-id]');
                var order = [];
                items.forEach(function(el) {
                    var id = parseInt(el.dataset.id);
                    if (id) order.push(id);
                });

                fetch('/admin/reorder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(order)
                }).then(function(r) { return r.json(); }).then(function(data) {
                    if (data.ok) {
                        showToast('Sıralama güncellendi', 'success');
                    }
                }).catch(function() {
                    showToast('Sıralama hatası', 'error');
                });
            }
        });
    }

    var observer = new MutationObserver(function() {
        initSortable();
    });
    observer.observe(document.body, { childList: true, subtree: true });

    document.body.addEventListener('htmx:afterSettle', function() {
        initSortable();
    });

    setTimeout(initSortable, 500);

    window.completeItem = function(id, btn) {
        var row = btn.closest('.glass-card');
        row.style.transition = 'all 0.3s ease';
        row.style.opacity = '0.3';
        row.style.transform = 'translateX(20px)';

        fetch('/admin/' + id + '/complete', {
            method: 'POST',
            headers: { 'Accept': 'application/json' },
        }).then(function(r) { return r.json(); }).then(function() {
            showToast('Kayıt tamamlandı!', 'success');
        }).catch(function() {
            row.style.opacity = '1';
            row.style.transform = 'none';
            showToast('Hata oluştu', 'error');
        });
    };

    window.adminDeleteItem = function(id, btn) {
        var row = btn.closest('.glass-card');
        row.style.transition = 'all 0.3s ease';
        row.style.opacity = '0.3';

        fetch('/admin/' + id + '/delete', {
            method: 'POST',
            headers: { 'Accept': 'application/json' },
        }).then(function(r) { return r.json(); }).then(function() {
            showToast('Kayıt silindi!', 'success');
        }).catch(function() {
            row.style.opacity = '1';
            showToast('Hata oluştu', 'error');
        });
    };

    window.moveItem = function(id, direction) {
        fetch('/admin/' + id + '/move-' + direction, {
            method: 'POST',
            headers: { 'Accept': 'application/json' },
        }).then(function(r) { return r.json(); }).then(function(data) {
            if (data.ok) {
                showToast('Taşındı', 'success');
            }
        }).catch(function() {
            showToast('Hata oluştu', 'error');
        });
    };

    window.switchTab = function(tab) {
        document.getElementById('waiting-tab').style.display = tab === 'waiting' ? '' : 'none';
        document.getElementById('completed-tab').style.display = tab === 'completed' ? '' : 'none';
        document.getElementById('deleted-tab').style.display = tab === 'deleted' ? '' : 'none';
        document.querySelectorAll('.tab-btn').forEach(function(btn) {
            btn.classList.toggle('active', btn.dataset.tab === tab);
        });
    };

    window.addAdminComment = function(itemId) {
        var input = document.getElementById('comment-input-' + itemId);
        var text = input.value.trim();
        if (!text) return;
        input.disabled = true;

        fetch('/admin/' + itemId + '/comment', {
            method: 'POST',
            headers: { 'Accept': 'application/json', 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'text=' + encodeURIComponent(text),
        }).then(function(r) { return r.json(); }).then(function() {
            showToast('Yorum eklendi!', 'success');
        }).catch(function() {
            showToast('Hata oluştu', 'error');
        }).finally(function() {
            input.disabled = false;
        });
    };
})();
</script>
{% endblock %}
