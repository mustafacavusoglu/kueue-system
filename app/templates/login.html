{% extends "base.html" %}
{% block title %}Baklava AI - Giriş{% endblock %}
{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div style="width: 100%; max-width: 420px; text-align: center;" class="animate-in">
        <div style="position: absolute; top: 24px; right: 24px;">
            <button id="theme-toggle-btn" class="theme-toggle" onclick="toggleTheme()"></button>
            <script>updateThemeIcon();</script>
        </div>

        <div class="login-logo">
            <div class="login-logo-inner">B</div>
        </div>
        <h1 class="glow-text" style="font-size: 40px; font-weight: 900; margin-bottom: 6px;">Baklava AI</h1>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 36px;">Ekip Lideri Kuyruk Yönetim Sistemi</p>

        <div class="glass-strong animate-in animate-in-delay-1" style="padding: 36px;">
            <a href="/login" class="btn-primary" style="display: inline-flex; align-items: center; gap: 10px; padding: 14px 28px; font-size: 15px; text-decoration: none;">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                Login with OpenShift
            </a>
        </div>

        <p style="color: var(--text-muted); font-size: 11px; margin-top: 28px; opacity: 0.6;">FIFO Queue &middot; Baklava AI</p>
    </div>
</div>
{% endblock %}
