<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Baklava AI{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
    <script>
        (function() {
            var t = localStorage.getItem('theme');
            if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
        })();
        function getTheme() {
            return document.documentElement.getAttribute('data-theme') || 'dark';
        }
        function toggleTheme() {
            var next = getTheme() === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon();
        }
        function updateThemeIcon() {
            var btn = document.getElementById('theme-toggle-btn');
            if (!btn) return;
            var isDark = getTheme() === 'dark';
            btn.innerHTML = isDark
                ? '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>'
                : '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>';
        }
        function showToast(msg, type) {
            var c = document.getElementById('toast-container');
            var t = document.createElement('div');
            t.className = 'toast toast-' + (type || 'success');
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(function() { t.remove(); }, 3200);
        }
    </script>
</head>
<body class="animated-bg">
    <div class="floating-diamonds">
        <div class="diamond"></div><div class="diamond"></div><div class="diamond"></div>
        <div class="diamond"></div><div class="diamond"></div><div class="diamond"></div>
        <div class="diamond"></div><div class="diamond"></div><div class="diamond"></div><div class="diamond"></div>
    </div>
    <div style="position: relative; z-index: 1;">
        {% block content %}{% endblock %}
    </div>
    <div id="toast-container"></div>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
