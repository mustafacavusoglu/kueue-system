{% if positions|length > 0 %}
<div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start;">
    {% for p in positions %}
    <div style="display: flex; align-items: center; gap: 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; {% if p.is_admin %}min-width: 160px;{% endif %}">
        <div id="queue-visual-pos-{{ p.target }}" style="width: {% if p.is_admin %}52px{% else %}36px{% endif %}; height: {% if p.is_admin %}52px{% else %}36px{% endif %}; background: linear-gradient(135deg, var(--gold-400), var(--gold-600)); border-radius: {% if p.is_admin %}14px{% else %}10px{% endif %}; display: flex; align-items: center; justify-content: center; font-size: {% if p.is_admin %}22px{% else %}14px{% endif %}; font-weight: 900; color: #78350f; flex-shrink: 0;">{{ p.position }}</div>
        <div style="min-width: 0;">
            <div style="color: var(--text-primary); font-weight: 600; font-size: {% if p.is_admin %}15px{% else %}12px{% endif %};">{{ p.display }}</div>
            <div style="color: var(--text-muted); font-size: {% if p.is_admin %}12px{% else %}10px{% endif %}; margin-top: 1px;">{{ p.position }}. sırada</div>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
